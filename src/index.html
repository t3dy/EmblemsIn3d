<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPin3D — Hypnerotomachia & Atalanta Animata</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0804; overflow: hidden; font-family: 'Georgia', serif; color: #f5f0e8; }

    /* PixiJS woodcut canvas — sits BEHIND Three.js */
    #woodcut-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* Three.js canvas */
    #three-canvas {
      position: fixed; inset: 0; z-index: 1;
    }

    /* UI overlay */
    #ui {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
    }

    /* Annotation card */
    #annotation-panel {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      max-width: 560px; width: 90%;
      background: rgba(10,8,4,0.92);
      border: 1px solid #8b4513;
      padding: 1.2rem 1.5rem;
      font-size: 0.9rem; line-height: 1.6;
      display: none;
      pointer-events: all;
    }
    #annotation-panel .source { color: #a0784a; font-size: 0.75rem; margin-top: 0.5rem; }
    #annotation-panel .close-btn {
      position: absolute; top: 0.5rem; right: 0.75rem;
      background: none; border: none; color: #8b4513;
      font-size: 1.1rem; cursor: pointer;
    }

    /* Emblem info HUD (top-left) */
    #emblem-hud {
      position: absolute; top: 1.5rem; left: 1.5rem;
      display: none;
    }
    #emblem-hud .stage-badge {
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #8b4513; background: rgba(10,8,4,0.8);
      border: 1px solid #8b4513; padding: 0.2rem 0.5rem; display: inline-block;
      margin-bottom: 0.4rem;
    }
    #emblem-hud h2 { font-size: 1.1rem; font-weight: normal; margin-bottom: 0.25rem; }
    #emblem-hud .motto { font-size: 0.8rem; color: #c8a878; font-style: italic; }

    /* World selector (top-right) */
    #world-nav {
      position: absolute; top: 1.5rem; right: 1.5rem;
      display: flex; gap: 0.75rem;
      pointer-events: all;
    }
    #world-nav button {
      background: rgba(10,8,4,0.8); border: 1px solid #4a2a10;
      color: #c8a878; font-family: 'Georgia', serif; font-size: 0.8rem;
      padding: 0.4rem 0.9rem; cursor: pointer; letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    #world-nav button:hover, #world-nav button.active {
      border-color: #8b4513; color: #f5f0e8;
    }

    /* Back button + emblem nav */
    #back-btn {
      display: none; margin-top: 0.6rem;
      background: none; border: 1px solid #4a2a10; color: #a0784a;
      font-family: 'Georgia', serif; font-size: 0.72rem; padding: 0.25rem 0.65rem;
      cursor: pointer; letter-spacing: 0.06em; pointer-events: all;
      transition: border-color 0.2s, color 0.2s;
    }
    #back-btn:hover { border-color: #8b4513; color: #f5f0e8; }

    #emblem-nav {
      display: none; gap: 0.5rem; margin-top: 0.5rem;
      pointer-events: all;
    }
    #emblem-nav button {
      background: rgba(10,8,4,0.8); border: 1px solid #4a2a10;
      color: #a0784a; font-size: 1.0rem; padding: 0.15rem 0.6rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    #emblem-nav button:hover:not(:disabled) { border-color: #8b4513; color: #f5f0e8; }
    #emblem-nav button:disabled { opacity: 0.25; cursor: default; }
    #emblem-nav .key-hint { font-size: 0.62rem; color: #6b5d4d; align-self: center; }

    /* Gallery hover tooltip */
    #gallery-tooltip {
      position: fixed; z-index: 20;
      background: rgba(10,8,4,0.92); border: 1px solid #8b4513;
      color: #c8a878; font-size: 0.72rem; padding: 0.3rem 0.65rem;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
      transform: translate(-50%, -100%);
    }

    /* Center message (HP/Archives placeholder) */
    #center-message {
      display: none; position: fixed; inset: 0; z-index: 5;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 0.8rem; pointer-events: none;
    }
    #center-message h2 { font-size: 1.2rem; font-weight: normal; color: #c8a878; letter-spacing: 0.1em; }
    #center-message p  { font-size: 0.85rem; color: #6b5d4d; text-align: center; line-height: 1.7; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: #0a0804;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem;
    }
    #loading h1 { font-size: 1.4rem; font-weight: normal; letter-spacing: 0.15em; color: #c8a878; }
    #loading-bar-wrap { width: 260px; height: 2px; background: #2a1a08; }
    #loading-bar { height: 100%; width: 0%; background: #8b4513; transition: width 0.3s; }
    #loading-sub { font-size: 0.75rem; color: #6b5d4d; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <canvas id="woodcut-canvas"></canvas>
  <canvas id="three-canvas"></canvas>

  <div id="ui">
    <div id="emblem-hud">
      <div class="stage-badge" id="hud-stage">NIGREDO</div>
      <h2 id="hud-title"></h2>
      <div class="motto" id="hud-motto"></div>
      <div id="emblem-nav">
        <button id="nav-prev" onclick="window.showcasePrev()" title="Previous emblem (←)">&#8592;</button>
        <button id="nav-next" onclick="window.showcaseNext()" title="Next emblem (→)">&#8594;</button>
        <span class="key-hint">&#8592;&#8594; keys &nbsp;|&nbsp; G = gallery</span>
      </div>
      <button id="back-btn" onclick="window.backToGallery()">&#8592; Gallery</button>
    </div>

    <div id="world-nav">
      <button id="btn-hp" onclick="window.switchWorld('HP')">Hypnerotomachia</button>
      <button id="btn-af" class="active" onclick="window.switchWorld('AF')">Atalanta Animata</button>
      <button id="btn-arch" onclick="window.switchWorld('ARCHIVES')">Archives</button>
    </div>

    <div id="annotation-panel">
      <button class="close-btn" onclick="document.getElementById('annotation-panel').style.display='none'">×</button>
      <div id="annotation-text"></div>
      <div id="annotation-source" class="source"></div>
    </div>
  </div>

  <div id="gallery-tooltip"></div>
  <div id="center-message"><h2></h2><p></p></div>

  <!-- Fade-to-black overlay for world transitions -->
  <div id="fade-overlay" style="
    position:fixed;inset:0;z-index:50;background:#060402;
    opacity:0;pointer-events:none;transition:opacity 0.3s ease;
  "></div>

  <!-- Key hint toast (bottom-centre, auto-fades) -->
  <div id="key-hint" style="
    position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
    z-index:20;pointer-events:none;
    font-family:Georgia,serif;font-size:0.72rem;letter-spacing:0.1em;
    color:#8a7a5a;background:rgba(6,4,2,0.85);
    border:1px solid #3a2a18;padding:0.3rem 0.9rem;
    opacity:0;transition:opacity 0.5s ease;
  "></div>

  <div id="loading">
    <h1>HPin3D</h1>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-sub" id="loading-sub">Preparing the alchemical world…</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
      "gsap": "https://esm.sh/gsap@3.12.5",
      "gsap/PixiPlugin": "https://esm.sh/gsap@3.12.5/PixiPlugin"
    }
  }
  </script>
  <script type="module" src="./main.js?v=8"></script>
</body>
</html>
